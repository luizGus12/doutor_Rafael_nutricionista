<div class="form-container">
    <h2>Entre em contato</h2>

    <form>
        <div class="form-group">
            <label>Nome</label>
            <input id="nome" type="text" placeholder="Seu nome">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input id="email" type="email" placeholder="Seu email">
        </div>

        <div class="form-group">
            <label>Telefone</label>
            <input id="telefone" type="tel" placeholder="(11) 99999-9999">
        </div>

        <div class="form-group">
            <label>Mensagem</label>
            <textarea id="mensagem" placeholder="Digite sua mensagem"></textarea>
        </div>

        <button id="enviar" type="submit">Enviar</button>
        <p id="msg"></p>
    </form>

    <a class="whatsapp" href="https://wa.me/5599999999999" target="_blank">
        Falar no WhatsApp
    </a>
